index_path = "pois.bleve"

# Optional: path to PBF for direct (no-index) search via ?mode=pbf
# pbf_path = "processed.osm.pbf"

# Optional: path to PMTiles for direct (no-index) search via ?mode=pmtiles
# pmtiles_path = "planet.pmtiles"

# Opt-in: perform precise intersection check for PMTiles (slower but more accurate)
# pmtiles_post_process = false

# Optional: path to wikimedia_importance TSV/CSV (tab-separated: language, type, title, importance, wikidata_id)
# Supports .gz compression. Boosts POIs with wikidata tags based on Wikipedia link prominence.
# wikidata_importance = "wikimedia-importance-2025-11.csv.gz"


languages = ["en", "zh", "hi", "es", "ar", "fr", "bn", "pt", "ur", "ru", "de", "ja", "pcm", "arz"]
geometry_mode = "geopoint"
simplification_tolerance = 0.0001

# Name analyzer controls how text is tokenized for search:
#   - "standard"   : Tokenizes on word boundaries (default). Use with fuzzy/prefix flags.
#   - "edge_ngram" : Prefix tokens (e.g., "restaurant" -> "r", "re", "res", ...).
#                    Great for autocomplete - matches partial input without fuzzy flag.
#   - "ngram"      : Substring tokens (e.g., "matrix" -> "ma", "at", "tr", "mat", ...).
#                    Enables substring matching but increases index size significantly.
name_analyzer = "standard"

# Toggle optional features
nodes_only = false                # Index only nodes (skip ways/relations)
disable_alt_names = false         # Skip alt_name, old_name, short_name fields
disable_importance = false        # Set all importance scores to 0
disable_class_subtype = false     # Skip class/subtype indexing
only_named = true                 # Only index objects with a name tag
store_metadata = false            # Store class/subtype/importance in index (increases size)
store_geometry = false            # Store geometry in index (increases size)
store_address = false             # Index addr:* tags for address search
index_wikidata_redirects = false  # Index Wikipedia redirect titles as alternate names (increases size)

# Build optimization
build_workers = 8                 # Parallel workers for index building (1-32)
geo_batch_size = 500              # Batch size for geometry operations (50-1000)

# Query cache
cache_enabled = false             # Enable query result caching
cache_size = 1000                 # Cache capacity in entries (default: 1000)
cache_ttl = "5m"                  # Cache entry TTL, e.g. "5m", "1h" (default: 5m)

[server]
host = "0.0.0.0"
port = 9889
# CORS (disabled by default)
# allowed_origins = ["http://localhost:3000", "https://example.com"]

[importance]
default = 1.0
population_boost_weight = 0.2     # importance += ln(pop+1) * weight
capital_boost = 2.0               # Added if capital=yes
wikipedia_boost = 1.5             # Added if wikipedia or wikidata tag present

# Boosts allow prioritizing specific classes and subtypes.
# Patterns can be:
#   - "hospital"         : Match if class="hospital" OR subtype="hospital"
#   - "amenity=hospital" : Match class="amenity" AND subtype="hospital"
#   - "hospital=*"       : Match class="hospital" AND any subtype
#   - "*=big" or "=big"  : Match any class AND subtype="big"
#
# Order matters: first match gets highest boost.
# Boosted items receive a high baseline score (e.g. 1000+) to sort above non-boosted matches.
# boosts = ["city", "town", "village", "hospital", "pharmacy", "restaurant", "cafe"]
